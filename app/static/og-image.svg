<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Grid de pontos decorativo -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1e1e1e"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow de fundo -->
  <ellipse cx="600" cy="280" rx="500" ry="220" fill="rgba(140,255,46,0.06)"/>

  <!-- Logo -->
  <text x="600" y="240" font-family="Arial,sans-serif" font-size="96" font-weight="900"
        fill="#f0f0f0" text-anchor="middle" letter-spacing="-4">BEMKT<tspan fill="#8cff2e">.</tspan></text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="Arial,sans-serif" font-size="28" font-weight="500"
        fill="#666" text-anchor="middle">Carrosseis profissionais para Instagram com IA</text>

  <!-- Badge -->
  <rect x="450" y="360" width="300" height="44" rx="22" fill="rgba(140,255,46,0.1)"
        stroke="rgba(140,255,46,0.3)" stroke-width="1"/>
  <text x="600" y="388" font-family="Arial,sans-serif" font-size="15" font-weight="700"
        fill="#8cff2e" text-anchor="middle" letter-spacing="2">PRONTOS EM 60 SEGUNDOS</text>
</svg>
